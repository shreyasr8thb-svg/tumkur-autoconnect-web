name: Build & Release Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update GitHub Releases

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 3. Use google-services.json from repository ────────────────────────────
      - name: Verify google-services.json
        run: |
          echo "google-services.json contents:"
          cat android/app/google-services.json
          echo "Package check:"
          grep -o '"com.tumukuru.connect"' android/app/google-services.json && echo "✅ Package name OK" || echo "❌ Package name missing!"

      # ── 4. Build web assets ───────────────────────────────────────────────────
      - name: Build web app (Vite)
        run: npm run build

      # ── 5. Java ───────────────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 6. App icons ──────────────────────────────────────────────────────────
      - name: Generate app icons from logo.png
        run: |
          sudo apt-get install -y imagemagick -q
          LOGO="src/assets/logo.png"
          declare -A SIZES=(
            ["android/app/src/main/res/mipmap-mdpi"]=48
            ["android/app/src/main/res/mipmap-hdpi"]=72
            ["android/app/src/main/res/mipmap-xhdpi"]=96
            ["android/app/src/main/res/mipmap-xxhdpi"]=144
            ["android/app/src/main/res/mipmap-xxxhdpi"]=192
          )
          for DIR in "${!SIZES[@]}"; do
            SIZE="${SIZES[$DIR]}"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher.png"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_round.png"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_foreground.png"
          done
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/white"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      # ── 7. Sync Capacitor (web assets + plugin wiring) ─────────────────────
      - name: Sync Capacitor plugins and web assets
        run: npx cap sync android

      # ── 8. Use committed debug keystore (stable SHA-1 = 78:53:74:BA:B7...) ───
      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          cp android/debug.keystore ~/.android/debug.keystore
          echo "=== Keystore SHA-1 ==="
          KEYSTORE_SHA1=$(keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>&1 | grep "SHA1:" | awk '{print $2}' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "Keystore SHA-1: $KEYSTORE_SHA1"

          # Extract SHA-1 from google-services.json and compare
          GS_SHA1=$(python3 -c "
          import json, sys
          data = json.load(open('android/app/google-services.json'))
          clients = data.get('client', [])
          for c in clients:
              for o in c.get('oauth_client', []):
                  info = o.get('android_info', {})
                  if info.get('package_name') == 'com.tumukuru.connect':
                      print(info.get('certificate_hash', '').lower())
                      sys.exit(0)
          print('')
          ")
          echo "google-services.json SHA-1: $GS_SHA1"

          if [ "$KEYSTORE_SHA1" != "$GS_SHA1" ]; then
            echo "❌ SHA-1 MISMATCH! Keystore=$KEYSTORE_SHA1 vs google-services.json=$GS_SHA1"
            echo "   Update the certificate_hash in google-services.json or recommit the debug.keystore."
            exit 1
          fi
          echo "✅ SHA-1 fingerprints match — Google Auth will work"

      # ── 8b. Verify Google Auth build flag ────────────────────────────────────
      - name: Verify rgcfaIncludeGoogle flag
        run: |
          if grep -q "rgcfaIncludeGoogle=1" android/gradle.properties; then
            echo "✅ rgcfaIncludeGoogle=1 is set — native Google Sign-In will be compiled in"
          else
            echo "❌ MISSING: rgcfaIncludeGoogle=1 not found in android/gradle.properties"
            echo "   This flag is required by @capacitor-firebase/authentication."
            echo "   Google Sign-In will crash at runtime without it!"
            exit 1
          fi

      # ── 9. Build APK ─────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle_output.log
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "❌ APK not found after build!"
            exit 1
          fi
          echo "✅ APK built: $(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)"

      # ── 10. Rename APK with build number ─────────────────────────────────────
      - name: Prepare APK artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release-artifacts/TumkuruConnect.apk
          echo "APK_PATH=release-artifacts/TumkuruConnect.apk" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ── 11. Upload to GitHub Releases (tag: latest-apk) ──────────────────────
      - name: Delete old 'latest-apk' release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          git push origin :refs/tags/latest-apk 2>/dev/null || true

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-apk \
            --title "Tumkuru Connect – Latest Build" \
            --notes "**Auto-built APK** from commit \`${{ env.COMMIT_SHORT }}\`

          🕐 Built: ${{ env.BUILD_DATE }}
          📦 Package: \`com.tumukuru.connect\`

          > ⚠️ This is a debug build. Allow installs from unknown sources in Android settings before installing." \
            --prerelease \
            "${{ env.APK_PATH }}"
          echo "✅ Released to GitHub Releases as 'latest-apk'"
