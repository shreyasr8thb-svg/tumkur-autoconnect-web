name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Generate App Icons from logo.png
        run: |
          sudo apt-get install -y imagemagick -q
          LOGO="src/assets/logo.png"
          declare -A SIZES=(
            ["android/app/src/main/res/mipmap-mdpi"]=48
            ["android/app/src/main/res/mipmap-hdpi"]=72
            ["android/app/src/main/res/mipmap-xhdpi"]=96
            ["android/app/src/main/res/mipmap-xxhdpi"]=144
            ["android/app/src/main/res/mipmap-xxxhdpi"]=192
          )
          for DIR in "${!SIZES[@]}"; do
            SIZE="${SIZES[$DIR]}"
            convert "$LOGO" -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher.png"
            convert "$LOGO" -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_round.png"
            convert "$LOGO" -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_foreground.png"
          done

      - name: Copy Web Assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/* android/app/src/main/assets/public/

      - name: Build APK
        working-directory: ./android
        id: gradle_build
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace > gradle_output.log 2>&1 || (cat gradle_output.log && exit 1)

      - name: Copy APK to public folder and Commit
        run: |
          mkdir -p public
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk public/TumkuruConnect.apk
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add public/TumkuruConnect.apk
            git commit -m "chore: Add latest APK build for Vercel" || echo "No changes to commit"
            git push origin HEAD:main
          else
            echo "APK build failed. Committing logs..."
            cp android/gradle_output.log public/gradle_output.txt
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add public/gradle_output.txt
            git commit -m "chore: Add gradle error log" || echo "No changes"
            git push origin HEAD:main
            exit 1
          fi
