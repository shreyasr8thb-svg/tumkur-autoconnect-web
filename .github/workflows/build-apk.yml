name: Build & Release Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update GitHub Releases

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 3. Inject google-services.json from GitHub Secret ─────────────────────
      # Store the file contents as a repo secret named GOOGLE_SERVICES_JSON
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "google-services.json written ($(wc -c < android/app/google-services.json) bytes)"

      # ── 4. Build web assets ───────────────────────────────────────────────────
      - name: Build web app (Vite)
        run: npm run build

      # ── 5. Java ───────────────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 6. App icons ──────────────────────────────────────────────────────────
      - name: Generate app icons from logo.png
        run: |
          sudo apt-get install -y imagemagick -q
          LOGO="src/assets/logo.png"
          declare -A SIZES=(
            ["android/app/src/main/res/mipmap-mdpi"]=48
            ["android/app/src/main/res/mipmap-hdpi"]=72
            ["android/app/src/main/res/mipmap-xhdpi"]=96
            ["android/app/src/main/res/mipmap-xxhdpi"]=144
            ["android/app/src/main/res/mipmap-xxxhdpi"]=192
          )
          for DIR in "${!SIZES[@]}"; do
            SIZE="${SIZES[$DIR]}"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher.png"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_round.png"
            convert "$LOGO" -background white -alpha remove -resize "${SIZE}x${SIZE}" "${DIR}/ic_launcher_foreground.png"
          done
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/white"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      # ── 7. Sync Capacitor web assets ─────────────────────────────────────────
      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/* android/app/src/main/assets/public/

      # ── 8. Stable debug keystore (from secret, falls back to fresh generate) ──
      - name: Setup keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "Using stored keystore from secret..."
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
          else
            echo "Generating fresh debug keystore..."
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "SHA1:" && keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>&1 | grep "SHA1:"

      # ── 9. Build APK ─────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle_output.log
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "❌ APK not found after build!"
            exit 1
          fi
          echo "✅ APK built: $(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)"

      # ── 10. Rename APK with build number ─────────────────────────────────────
      - name: Prepare APK artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release-artifacts/TumkuruConnect.apk
          echo "APK_PATH=release-artifacts/TumkuruConnect.apk" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ── 11. Upload to GitHub Releases (tag: latest-apk) ──────────────────────
      - name: Delete old 'latest-apk' release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          git push origin :refs/tags/latest-apk 2>/dev/null || true

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-apk \
            --title "Tumkuru Connect – Latest Build" \
            --notes "**Auto-built APK** from commit \`${{ env.COMMIT_SHORT }}\`

          🕐 Built: ${{ env.BUILD_DATE }}
          📦 Package: \`com.tumukuru.connect\`

          > ⚠️ This is a debug build. Allow installs from unknown sources in Android settings before installing." \
            --prerelease \
            "${{ env.APK_PATH }}"
          echo "✅ Released to GitHub Releases as 'latest-apk'"
